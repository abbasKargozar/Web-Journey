<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Journey</title>

    <style>
        body{
            background-color: rgba(9, 204, 204, 0.6);
        }
        .links{
            background-color: rgba(21, 164, 83, 0.8);
            border: 2px solid rgba(3, 16, 97, 0.6);
            border-radius: 25px;
            width: 80%;
            margin: 0 auto;
        }
        .my-list{
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        .my-list > li{
            text-align: center;
            list-style-type: none;
            margin: 20px;

        }
        .my-list > li > a {
            text-decoration: none;
            color: black;
            background-color: rgb(196, 230, 208);
            font-family: 'Courier New';
            font-size: xx-large;
            font-weight: 500;
            padding: 15px;
            border-radius: 25px;
        }
        .my-list > li > a:hover {
            text-decoration: none;
            color: black;
            background-color: rgb(176, 202, 208);
            font-family: 'Courier New';
            font-size: xx-large;
            font-weight: 700;
            padding: 15px;
            border-radius: 25px;
        }
        #coming-soon{
            transition-duration: 0.5s;
            transition-timing-function: ease-in-out;
        }
        #coming-soon:hover{
            background-color: red;
        }

    </style>
</head>
<body>
    <h1 style="text-align: center; color:rgb(11, 89, 8); text-shadow: 15px 15px 30px rgb(125, 129, 6);">Link to every practise</h1>
    <div class="links">
        <ul class="my-list">
            <li><a href="./001_Start_With_html/text.html" target="_blank" rel="noopener noreferrer"> Start html with Text</a></li>
            <li><a href="./002_Table_With_html/rawTable.html" target="_blank" rel="noopener noreferrer">How create Tables in html</a></li>
            <li><a href="./003_List_With_html/list.html" target="_blank" rel="noopener noreferrer">How to create list in html</a></li>
            <li><a href="./004_Link_With_html/Link.html" target="_blank" rel="noopener noreferrer">How to define hyperlinks in html</a></li>
            <li><a
                href="#"
                id="coming-soon" 
                onmouseover="this.innerHTML='***Comming soon***!'"
                onmouseout="this.innerHTML= 'Multimedia in html'">
                
                Multimedia in html
            </a></li>

        </ul>
    </div>
    
</body>
</html>
